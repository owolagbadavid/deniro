<svg width="340" height="80" viewBox="0 0 340 80" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Deniro logo</title>
  <desc>Deniro wordmark with D monogram icon — PR review platform</desc>

  <style>
    .icon-bg   { fill: #EEEDFE; }
    .icon-ring { stroke: #534AB7; fill: none; }
    .icon-d    { fill: #534AB7; }
    .check     { stroke: #534AB7; }
    .wordmark  { font-family: Arial, Helvetica, sans-serif; font-weight: 500; fill: #1a1a1a; }
    .tagline   { font-family: Arial, Helvetica, sans-serif; font-weight: 400; fill: #888; }
  </style>

  <!-- Icon mark -->
  <rect class="icon-bg" x="0" y="0" width="80" height="80" rx="18"/>
  <circle class="icon-ring" cx="40" cy="40" r="26" stroke-width="5" stroke-dasharray="130 34" stroke-dashoffset="-8" stroke-linecap="round"/>
  <text class="icon-d" x="27" y="57" font-size="44" font-weight="700" font-family="Arial, Helvetica, sans-serif">D</text>
  <polyline class="check" points="52,14 58,21 67,10" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text class="wordmark" x="96" y="46" font-size="40" letter-spacing="-1">deniro</text>
  <text class="tagline" x="97" y="66" font-size="13" letter-spacing="0.5">PR REVIEW, DONE RIGHT</text>
</svg>
